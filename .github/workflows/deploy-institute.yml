name: Deploy New Institute Demo

on:
  push:
    paths:
      - 'institutes/**.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed institute files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'institutes/*.json' | head -1)
          echo "file=$CHANGED" >> $GITHUB_OUTPUT
          echo "Found: $CHANGED"

      - name: Read institute config
        id: config
        run: |
          FILE="${{ steps.changed.outputs.file }}"
          if [ -z "$FILE" ]; then echo "No institute file changed"; exit 0; fi
          
          ID=$(cat $FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
          BRAND=$(cat $FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['brand'])")
          COLOR=$(cat $FILE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['colorPrimary'])")
          
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "brand=$BRAND" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate App.jsx from template
        run: node scripts/generate-app.js "${{ steps.config.outputs.file }}"

      - name: Set generated file path
        run: echo "generated_file=generated/${{ steps.config.outputs.id }}/App.jsx" >> $GITHUB_ENV

      - name: Create GitHub Repo from Template
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          INSTITUTE_ID: ${{ steps.config.outputs.id }}
          INSTITUTE_BRAND: ${{ steps.config.outputs.brand }}
          ORG: owusumarv95-collab
          TEMPLATE_REPO: nachhilfe-verwaltungsportal-template
        run: |
          REPO_NAME="demo-${INSTITUTE_ID}"
          
          # Check if repo already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$ORG/$REPO_NAME")
          
          if [ "$STATUS" = "404" ]; then
            echo "Creating new repo: $REPO_NAME"
            curl -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$ORG/$TEMPLATE_REPO/generate" \
              -d "{
                \"owner\": \"$ORG\",
                \"name\": \"$REPO_NAME\",
                \"description\": \"Demo Portal fuer $INSTITUTE_BRAND\",
                \"private\": false
              }"
            echo "Waiting for repo to be ready..."
            sleep 5
          else
            echo "Repo already exists: $REPO_NAME"
          fi
          
          echo "repo_name=$REPO_NAME" >> $GITHUB_ENV

      - name: Push App.jsx to institute repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ORG: owusumarv95-collab
        run: |
          REPO_NAME="${{ steps.config.outputs.id }}"
          REPO_NAME="demo-${REPO_NAME}"
          
          # Get current file SHA (needed for update)
          SHA=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$ORG/$REPO_NAME/contents/src/App.jsx" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          
          CONTENT=$(base64 -w 0 ${{ env.generated_file }})
          
          if [ -z "$SHA" ]; then
            # Create new file
            curl -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$ORG/$REPO_NAME/contents/src/App.jsx" \
              -d "{\"message\": \"Deploy: ${{ steps.config.outputs.brand }}\", \"content\": \"$CONTENT\"}"
          else
            # Update existing file
            curl -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$ORG/$REPO_NAME/contents/src/App.jsx" \
              -d "{\"message\": \"Update: ${{ steps.config.outputs.brand }}\", \"content\": \"$CONTENT\", \"sha\": \"$SHA\"}"
          fi

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG: owusumarv95-collab
        run: |
          REPO_NAME="demo-${{ steps.config.outputs.id }}"
          
          # Trigger Vercel deployment via API
          curl -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments" \
            -d "{
              \"name\": \"$REPO_NAME\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"$ORG\",
                \"repo\": \"$REPO_NAME\",
                \"ref\": \"main\"
              }
            }"

      - name: Summary
        run: |
          echo "## Demo deployed!" >> $GITHUB_STEP_SUMMARY
          echo "- Institut: ${{ steps.config.outputs.brand }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repo: demo-${{ steps.config.outputs.id }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://demo-${{ steps.config.outputs.id }}.vercel.app" >> $GITHUB_STEP_SUMMARY
